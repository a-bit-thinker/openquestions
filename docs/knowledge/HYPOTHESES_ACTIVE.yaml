hypotheses:
  - hypothesis_id: H001
    statement: "Verified derivation-veto gate increases useful solve yield by removing impossible q=r+1 candidates before solver spend."
    expected_metric_movement:
      - reduce_wasted_rounds
      - increase_useful_solve_ratio
    falsification_condition: "Reject if vetoed instances later receive valid certificates or matched-budget ablation shows no reduction in wasted rounds."
